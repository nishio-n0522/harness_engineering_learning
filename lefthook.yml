pre-commit:
  parallel: true
  jobs:
    - name: check-shebang
      run: ./docs/phase1/exercise/3/scripts/check-shebang.sh {staged_files}
      glob: "*.sh"
    - name: check-capital-extension
      run: ./docs/phase1/exercise/3/scripts/check-capital-extension.sh {staged_files}

commit-msg:
  jobs:
    - name: check-commit-msg
      run: ./docs/phase1/exercise/3/scripts/check-commit-msg.sh {1}

pre-push:
  jobs:
    - name: confirm-protected-push
      run: ./docs/phase1/exercise/3/scripts/confirm-protected-push.sh {0}
      use_stdin: true
