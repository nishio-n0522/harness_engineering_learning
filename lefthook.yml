pre-commit:
  parallel: true
  jobs:
    - name: check-shebang
      run: ./docs/phase1/exercise/3/scripts/check-shebang.sh {staged_files}
      glob: "*.sh"

    - name: check-capital-extension
      run: ./docs/phase1/exercise/3/scripts/check-capital-extension.sh {staged_files}

