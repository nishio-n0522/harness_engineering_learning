name: test-functions
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: printenv | grep '_FUNC'
        env:
          CONTAINS_FUNC: ${{ contains('Hello', 'ell')}}
          STARTWITH_FUNC: ${{ startsWith('Hello', 'He')}}
          ENDWITH_FUNC: ${{ endsWith('Hello', 'llo')}}
      - name: containsの配列としての使い方を確認
        env:
          # 配列やオブジェクトはenvに直接渡せない（A sequence was not expectedエラー）
          # toJSONで文字列化してから渡す必要がある
          COMMITS: ${{ toJSON(github.event.commits) }}
          # contains(配列, 値) は配列要素の「完全一致」を判定する（部分一致ではない）
          # 例: messageの配列に 'feat' と完全一致する要素があるか → false
          # NOTE: IDEがcommits[]のスキーマを推論できず "Context access might be invalid" 警告を出すが、
          # GitHub Actionsの公式構文として正しく、実行時は問題なく動作する
          CONTAINS_MESSAGE_EXACT: ${{ contains(github.event.commits.*.message, 'feat') }}
          # join()で配列を1つの文字列に連結 → contains(文字列, 値) は部分一致になる
          # 例: いずれかのコミットメッセージに 'feat' を含むか → true
          CONTAINS_MESSAGE_PARTIAL: ${{ contains(join(github.event.commits.*.message, ' '), 'feat') }}
        run: |
          echo "=== commits配列 ==="
          echo "$COMMITS"
          echo "=== contains判定（完全一致モード: 配列要素 == 'feat'） ==="
          echo "$CONTAINS_MESSAGE_EXACT"
          echo "=== contains判定（部分一致モード: join後の文字列に 'feat' を含む） ==="
          echo "$CONTAINS_MESSAGE_PARTIAL"
