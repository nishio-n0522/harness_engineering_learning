name: manual_workflow
on:
  workflow_dispatch:
    inputs:
      greeting:
        type: string
        default: Hello
        required: true
        description: A cheerful world
      log-level:
        type: choice
        default: info
        options:
          - info
          - warn
          - error
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: printf "[${{ inputs.log-level }}] ${{ inputs.greeting }}, world"
