name: environment-variables
on: push
env:
  EXAMPLE: Define by workflow level
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: echo "${EXAMPLE}"
      - env:
          EXAMPLE: Define by step level
        run: echo "${EXAMPLE}"
      - name: show-env-context
        env:
          CHECK_CONTEXT_ENV: ${{ toJson(env) }}
        run: |
          echo "=== env context (workflow定義のenvのみ) ==="
          echo "$CHECK_CONTEXT_ENV"
      - name: show-all-runner-env
        run: |
          echo "=== ランナー上の全環境変数（GITHUB_*, RUNNER_*等を含む） ==="
          env | sort
