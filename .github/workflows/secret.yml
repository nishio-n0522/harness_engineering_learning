name: secret
on: push
jobs:
  print:
    runs-on: ubuntu-latest
    env:
      PASSWORD: ${{ secrets.PASSWORD }}
    steps:
      - run: echo "${PASSWORD}"
      # シークレットを加工して断片に分割するとマスキングをすり抜ける
      # （マスキングは値の完全一致ベースで動くため、分割・変換された値は検出されない）
      # 先頭1文字とそれ以外をスペース区切りで出力 → ログ上にパスワードが平文で露出する
      - run: echo "${PASSWORD:0:1} ${PASSWORD#?}"
